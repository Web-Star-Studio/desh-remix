services:
  postgres:
    image: postgres:16-alpine
    container_name: desh_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: desh
      POSTGRES_PASSWORD: desh
      POSTGRES_DB: desh_dev
    ports:
      - "5433:5432"
    volumes:
      - desh_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U desh -d desh_dev"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  desh_pg_data:
