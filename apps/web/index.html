    <style>
      #desh-splash{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:#0A0A0F;transition:opacity .4s ease}
      #desh-splash.hide{opacity:0;pointer-events:none}
      #desh-splash img{width:64px;height:64px;animation:pulse-logo 1.6s ease-in-out infinite}
      @keyframes pulse-logo{0%,100%{opacity:.6;transform:scale(1)}50%{opacity:1;transform:scale(1.08)}}
      #desh-splash .bar{width:120px;height:3px;border-radius:4px;background:#1a1a1f;margin-top:24px;overflow:hidden}
      #desh-splash .bar::after{content:'';display:block;width:40%;height:100%;background:#C8956C;border-radius:4px;animation:slide 1.2s ease-in-out infinite}
      @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(350%)}}
    </style>
</head>

  <body>
    <div id="desh-splash">
      <div style="display:flex;flex-direction:column;align-items:center">
        <img src="/desh-icon.png" alt="DESH" width="64" height="64" fetchpriority="high" decoding="async" />
        <div class="bar"></div>
      </div>
    </div>
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Hide splash once React mounts
      var obs = new MutationObserver(function(m){
        var root = document.getElementById('root');
        if(root && root.children.length > 0){
          var splash = document.getElementById('desh-splash');
          if(splash){splash.classList.add('hide');setTimeout(function(){splash.remove()},500)}
          obs.disconnect();
        }
      });
      obs.observe(document.getElementById('root'),{childList:true,subtree:true});
    </script>
  </body>
</html>
